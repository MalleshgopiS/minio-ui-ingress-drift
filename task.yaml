id: minio-ui-ingress-drift

title: Fix Drifted MinIO UI Ingress

difficulty: easy

tags:
  - kubernetes
  - ingress
  - devops
  - configuration-drift

prompt: |
  A Kubernetes Ingress named `bleater-ui` exists in the `bleater`
  namespace but has configuration drift.

  Your task is to repair the ingress configuration.

  Requirements:

  1. Host MUST remain:
     minio.devops.local

  2. Backend service name MUST be:
     bleater-minio

  3. Backend service port MUST be:
     9001

  4. TLS secret MUST be:
     bleater-minio-tls

  IMPORTANT CONSTRAINTS:

  - You MUST modify the existing ingress.
  - DO NOT delete and recreate the resource.
  - DO NOT create new ingress resources.
  - Only patch or edit the existing configuration.

  The environment is already prepared with an intentionally
  drifted ingress resource.

entrypoint: solution.sh
grader: grader.py