id: minio-ui-ingress-drift
title: Fix MinIO UI Ingress Drift
difficulty: hard

description: |
  The Bleater UI is broken externally while API endpoints still work.

  Recent infrastructure drift caused:

  - dnsmasq wildcard *.devops.local pointing to old ingress IP
  - ingress root path routing to wrong backend
  - MinIO console port mismatch
  - TLS secret rotation
  - UI bucket became private

environment:
  facts:
    - Namespace: bleater
    - Ingress name: bleater
    - MinIO service: bleater-minio
    - Console port: 9001
    - TLS secret: bleater-ui-tls
    - Bucket: ui
    - mc alias: local

requirements:
  - bleater.devops.local resolves to ingress IP
  - /api routing remains unchanged
  - / routes to MinIO console (9001)
  - ingress uses bleater-ui-tls
  - UI bucket allows anonymous download

constraints:
  - Do NOT restart k3s
  - Modify existing resources only