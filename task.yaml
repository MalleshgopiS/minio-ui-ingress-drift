id: minio-ui-dns-ingress-drift

prompt: |
  The Bleater platform UI is partially broken.

  Symptoms:
  - API endpoints under /api/* work correctly.
  - Static UI assets fail externally.
  - Internal cluster communication works normally.

  Investigate and fix the external access path for:
      https://bleater.devops.local

  The issue involves configuration drift across:
  - dnsmasq wildcard DNS
  - NGINX ingress routing
  - MinIO service configuration
  - TLS configuration
  - MinIO bucket permissions

  Requirements:

  1. *.devops.local must resolve to the active ingress IP.
  2. Ingress must route:
        /api → API gateway (unchanged)
        /    → MinIO console service
  3. MinIO backend must use correct service + port.
  4. TLS secret referenced by ingress must be valid.
  5. MinIO UI bucket must allow public read access.

  Constraints:
  - Do NOT create new services.
  - Modify existing resources only.
  - Do NOT restart k3s or docker.
  - Fix using Kubernetes + system configuration only.

metadata:
  category: devops
  difficulty: hard