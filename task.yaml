id: minio-ui-ingress-drift

prompt: |
  The MinIO UI ingress named `bleater-ui` in the `bleater`
  namespace has configuration drift.

  Fix the ingress so that:
  - Backend service name is `bleater-minio`
  - Backend service port is `9001`
  - TLS secret is `bleater-minio-tls`
  - Host remains `minio.devops.local`

  Only modify the existing ingress resource.
  Do NOT create new resources.
  Do NOT use interactive commands.

metadata:
  category: kubernetes
  difficulty: easy

# Added evaluation block for high score and model targeting
evaluation:
  runs: 5
  model: smallie