id: minio-ui-dns-ingress-drift

prompt: |
  The Bleater platform UI is partially broken.

  API endpoints under /api/* work correctly,
  but the web UI fails externally.

  Investigate and restore:

      https://bleater.devops.local

  The failure involves configuration drift across:
  - dnsmasq wildcard DNS
  - NGINX ingress routing
  - MinIO configuration
  - TLS configuration
  - MinIO bucket permissions

  Requirements:

  1. bleater.devops.local resolves to the active ingress controller IP.
  2. /api routes to API gateway unchanged.
  3. / routes to MinIO console service.
  4. TLS secret reference is correct.
  5. MinIO UI bucket allows anonymous read access.

  Constraints:
  - Do NOT create new services.
  - Modify existing resources only.
  - Do NOT restart k3s or docker.

metadata:
  category: devops
  difficulty: hard