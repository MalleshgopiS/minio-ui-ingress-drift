name: minio-ui-ingress-drift

description: |
  A configuration drift has occurred in the Kubernetes Ingress resource
  `bleater-ui` inside the `bleater` namespace.

  The ingress is intended to expose the MinIO UI but currently routes
  traffic incorrectly due to drifted configuration.

  Your task is to repair the existing ingress configuration.

  REQUIRED FIXES:

  - Backend service name must be: bleater-minio
  - Backend service port must be: 9001
  - TLS secret must be: bleater-minio-tls
  - Host must remain: minio.devops.local

  CONSTRAINTS:

  - Only MODIFY the existing ingress resource.
  - DO NOT delete or recreate the ingress.
  - DO NOT create new ingress resources.
  - DO NOT use interactive commands.
  - The ingress resource UID must remain unchanged
    (the grader verifies the resource was modified in-place).

  ENVIRONMENT SETUP:

  The environment is initialized automatically via setup.sh before
  execution begins. Setup creates a drifted ingress configuration
  and records the original ingress UID for validation.

difficulty: easy

tags:
  - kubernetes
  - ingress
  - devops
  - debugging