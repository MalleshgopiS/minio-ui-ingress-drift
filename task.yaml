id: minio-ui-ingress-drift
prompt: |
  [Context]
  You are a DevOps engineer maintaining the storage infrastructure for Bleater. 
  The Minio object storage UI is supposed to be accessible via an Ingress at `minio-ui.devops.local`. 
  
  Currently, developers are reporting they cannot access the console. Preliminary checks suggest a configuration drift in the `minio` namespace.
  
  [TASK]
  1. Identify the service name and port for the Minio Console (UI) in the `minio` namespace.
  2. Create or fix an Ingress named `minio-ui-ingress` in the `minio` namespace.
  3. The Ingress must route traffic from host `minio-ui.devops.local` to the correct service on the correct port.
  
  IMPORTANT: Do NOT use any interactive commands.
metadata:
  category: kubernetes
  difficulty: easy