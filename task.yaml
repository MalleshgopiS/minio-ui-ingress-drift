id: minio-ui-dns-ingress-drift

prompt: |
  The Bleater platform UI is partially broken.

  API endpoints under /api/* work correctly,
  but static UI assets fail externally.

  Restore access to:

      https://bleater.devops.local

  Environment Facts:

  - All application resources run in the "bleater" namespace.
  - An ingress resource named "bleater" exposes the platform.
  - The API is served through the "api-gateway" service.
  - The UI is served from the MinIO console service named "bleater-minio".
  - The MinIO console listens on port 9001.
  - TLS certificates were recently rotated and the active secret is named
    "bleater-ui-tls".
  - UI assets are stored in a bucket named "ui".
  - The MinIO client (mc) is preconfigured with alias "local".
  - External DNS for *.devops.local is managed using dnsmasq.

  Requirements:

  1. bleater.devops.local resolves to the active ingress controller IP.
  2. /api continues routing to the api-gateway service unchanged.
  3. / routes to the bleater-minio console service on port 9001.
  4. The ingress references the bleater-ui-tls secret.
  5. UI assets in the ui bucket are publicly readable.

  Constraints:
  - Modify existing resources only.
  - Do NOT restart k3s or docker.

metadata:
  category: devops
  difficulty: hard