id: minio-ui-dns-ingress-drift

prompt: |
  The Bleater platform UI is partially broken.

  API endpoints under /api/* work correctly,
  but static UI assets fail externally.

  Restore access to:

      https://bleater.devops.local

  Investigation hints:
  - The MinIO console normally runs behind an ingress.
  - The console service exposes a different port than the API.
  - TLS certificates were recently rotated.
  - External DNS may reference an outdated ingress IP.
  - Bucket permissions may block anonymous UI access.

  Requirements:

  1. bleater.devops.local resolves to the active ingress controller IP.
  2. /api continues routing to the API gateway.
  3. / routes to the MinIO console service.
  4. Ingress references the active TLS secret.
  5. UI assets are publicly readable.

  Constraints:
  - Modify existing resources only.
  - Do NOT restart k3s or docker.

metadata:
  category: devops
  difficulty: hard